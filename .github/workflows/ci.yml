name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — TypeScript + Prisma
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: TypeScript build
        run: npm run build

      - name: Validate Prisma schema
        run: npx prisma validate

  frontend:
    name: Frontend — Next.js Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Next.js build
        run: npm run build
        env:
          # Dummy values so build doesn't fail on missing env vars
          NEXT_PUBLIC_BACKEND_URL: https://portfolio-backend-2qry.onrender.com
          BACKEND_URL: https://portfolio-backend-2qry.onrender.com
