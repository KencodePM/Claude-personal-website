databases:
  - name: portfolio-db
    plan: free
    region: singapore

services:
  - type: web
    name: portfolio-backend
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && ./node_modules/.bin/prisma generate && npm run build
    startCommand: ./node_modules/.bin/prisma migrate deploy && node dist/seed.js && node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
