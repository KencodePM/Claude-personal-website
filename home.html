<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的個人網站</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <!-- 頁面頂部的 header 內容 -->
        <h1>我的個人網站</h1>
        <nav>
            <ul>
                <li><a href="#about">關於我</a></li>
                <li><a href="#projects">項目展示</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="about">
            <h2>關於我</h2>
            <p>作為一個在科技業工作的教育業者</p>
        </section>

        <section id="projects">
            <h2>項目展示</h2>
            <ul>
                <li><a href="https://project1.example.com" target="_blank">項目 1</a></li>
                <li><a href="https://project2.example.com" target="_blank">項目 2</a></li>
                <li><a href="https://project3.example.com" target="_blank">項目 3</a></li>
            </ul>
        </section>

        <section id="skills">
            <h2>技能</h2>
            <div class="skills-container">
                <div class="skill-category">
                    <h3>產品經理</h3>
                    <ul>
                        <li>需求分析</li>
                        <li>產品規劃</li>
                        <li>用戶研究</li>
                        <li>市場分析</li>
                        <li>專案管理</li>
                    </ul>
                </div>
                <div class="skill-category">
                    <h3>軟體工程</h3>
                    <div class="skill-icons">
                        <div class="skill-item">
                            <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/java/java-original.svg" alt="Java">
                            <span class="skill-name">Java</span>
                        </div>
                        <div class="skill-item">
                            <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg" alt="JavaScript">
                            <span class="skill-name">JavaScript</span>
                        </div>
                        <div class="skill-item">
                            <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg" alt="Python">
                            <span class="skill-name">Python</span>
                        </div>
                        <div class="skill-item">
                            <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/amazonwebservices/amazonwebservices-original-wordmark.svg" alt="AWS">
                            <span class="skill-name">AWS</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <!-- 頁面底部的 footer 內容 -->
        <p>&copy; 2024 我的個人網站. 版權所有.</p>
    </footer>

</html>
